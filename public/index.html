<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HealthBot AI — Asisten Kesehatan Cerdas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Simulasi halaman website -->
  <div class="page-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-overlay"></div>
  </div>
  <div class="page-content">
    <h1><i class="fas fa-heartbeat"></i> HealthBot AI</h1>
    <p>Selamat datang di portal kesehatan kami.<br>Ada pertanyaan seputar kesehatan? Klik tombol chat di pojok kanan bawah!</p>
  </div>

  <!-- ===================== FLOATING WIDGET ===================== -->

  <!-- Toggle button -->
  <button class="fab" id="fab" aria-label="Buka HealthBot AI">
    <div class="fab-ring"></div>
    <span class="fab-icon fab-icon--open"><i class="fas fa-comment-medical"></i></span>
    <span class="fab-icon fab-icon--close hidden"><i class="fas fa-xmark"></i></span>
    <span class="fab-badge" id="fab-badge">1</span>
  </button>

  <!-- Chat widget -->
  <div class="widget" id="widget" aria-hidden="true">

    <!-- Header -->
    <div class="widget-header">
      <div class="header-bot">
        <div class="avatar-wrap">
          <div class="avatar-ring"></div>
          <div class="avatar-icon"><i class="fas fa-robot"></i></div>
          <span class="online-dot"></span>
        </div>
        <div class="header-info">
          <h2>HealthBot AI</h2>
          <p class="bot-status"><span class="pulse-dot"></span>Online &mdash; Siap membantu</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-icon" id="clear-btn" title="Reset percakapan">
          <i class="fas fa-rotate-left"></i>
        </button>
        <button class="btn-icon" id="close-btn" title="Tutup">
          <i class="fas fa-chevron-down"></i>
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages" id="chat-box"></div>

    <!-- Quick suggestions -->
    <div class="suggestions-wrap" id="suggestions-wrap">
      <div class="suggestions">
        <button class="chip" data-msg="Apa saja gejala flu dan cara mengatasinya?">
          <i class="fas fa-thermometer-half"></i> Gejala Flu
        </button>
        <button class="chip" data-msg="Bagaimana cara menjaga kesehatan jantung?">
          <i class="fas fa-heart"></i> Jantung Sehat
        </button>
        <button class="chip" data-msg="Makanan apa yang baik untuk diet sehat?">
          <i class="fas fa-apple-alt"></i> Diet Sehat
        </button>
        <button class="chip" data-msg="Bagaimana cara mengatasi stress dan kecemasan?">
          <i class="fas fa-brain"></i> Atasi Stres
        </button>
        <button class="chip" data-msg="Berapa kebutuhan air minum ideal per hari?">
          <i class="fas fa-droplet"></i> Kebutuhan Air
        </button>
        <button class="chip" data-msg="Apa itu hipertensi dan cara mencegahnya?">
          <i class="fas fa-stethoscope"></i> Hipertensi
        </button>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <form id="chat-form">
        <div class="input-box">
          <textarea
            id="user-input"
            placeholder="Tanya seputar kesehatan…"
            autocomplete="off"
            rows="1"
          ></textarea>
          <button type="submit" id="send-btn" disabled>
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </form>
      <p class="input-note">
        <i class="fas fa-shield-heart"></i> Bukan pengganti konsultasi dokter
      </p>
    </div>

  </div>
  <!-- =================== END FLOATING WIDGET =================== -->

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
